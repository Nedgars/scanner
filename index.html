<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>FreightScan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background:#0a0a0a;
  color:#fff;
  font-family:-apple-system,'SF Pro Display',sans-serif;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header {
  padding:16px 20px;
  padding-top:max(16px,env(safe-area-inset-top));
  background:#111;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo { font-size:20px; font-weight:700; letter-spacing:-0.5px; }
.logo span { color:#f97316; }

.doc-badge {
  background:#f97316;
  color:#fff;
  font-size:12px;
  font-weight:700;
  padding:4px 12px;
  border-radius:20px;
  display:none;
}

/* SCAN ZONE */
.scan-zone {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 24px;
  gap:24px;
}

.scan-icon-wrap {
  width:120px;
  height:120px;
  border-radius:24px;
  background:rgba(249,115,22,0.1);
  border:2px solid rgba(249,115,22,0.3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
}

.scan-zone h1 {
  font-size:24px;
  font-weight:700;
  text-align:center;
  letter-spacing:-0.5px;
}

.scan-zone p {
  font-size:15px;
  color:rgba(255,255,255,0.45);
  text-align:center;
  line-height:1.5;
  max-width:280px;
}

/* BIG SCAN BUTTON */
.scan-btn {
  width:100%;
  max-width:320px;
  padding:18px;
  background:#f97316;
  color:#fff;
  border:none;
  border-radius:16px;
  font-family:inherit;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  transition:opacity 0.15s, transform 0.1s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.scan-btn:active { opacity:0.85; transform:scale(0.98); }

.scan-btn-secondary {
  width:100%;
  max-width:320px;
  padding:16px;
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.scan-btn-secondary:active { opacity:0.7; }

/* DOCS SECTION */
.docs-section {
  padding:0 20px 20px;
  display:none;
  flex-direction:column;
  gap:10px;
}

.section-title {
  font-size:13px;
  font-weight:600;
  color:rgba(255,255,255,0.4);
  text-transform:uppercase;
  letter-spacing:1px;
  padding:16px 0 4px;
}

.doc-card {
  background:#1a1a1a;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.07);
  display:flex;
  align-items:center;
  gap:0;
}

.doc-preview {
  width:72px;
  height:72px;
  object-fit:cover;
  flex-shrink:0;
  background:#222;
}

.doc-info {
  flex:1;
  padding:12px 14px;
  min-width:0;
}

.doc-name {
  font-size:15px;
  font-weight:600;
  margin-bottom:3px;
}

.doc-meta {
  font-size:12px;
  color:rgba(255,255,255,0.35);
}

.doc-actions {
  display:flex;
  flex-direction:column;
  gap:0;
  padding:0 12px;
}

.icon-btn {
  background:none;
  border:none;
  color:rgba(255,255,255,0.3);
  font-size:18px;
  cursor:pointer;
  padding:6px;
  border-radius:8px;
  transition:color 0.15s;
}

.icon-btn:active { color:#f97316; }

/* EXPORT */
.export-wrap {
  padding:16px 20px;
  padding-bottom:max(20px,env(safe-area-inset-bottom));
  background:#111;
  border-top:1px solid rgba(255,255,255,0.08);
  display:none;
}

.export-btn {
  width:100%;
  padding:17px;
  background:#fff;
  color:#000;
  border:none;
  border-radius:14px;
  font-family:inherit;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:opacity 0.15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.export-btn:active { opacity:0.8; }
.export-btn:disabled { opacity:0.3; }

/* PREVIEW MODAL */
.modal {
  position:fixed;
  inset:0;
  background:#000;
  z-index:100;
  display:none;
  flex-direction:column;
}

.modal.show { display:flex; }

.modal-header {
  padding:16px 20px;
  padding-top:max(16px,env(safe-area-inset-top));
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(12px);
}

.modal-title { font-size:17px; font-weight:600; }

.modal-close {
  background:rgba(255,255,255,0.1);
  border:none;
  color:#fff;
  width:32px; height:32px;
  border-radius:50%;
  font-size:16px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

.modal-img {
  flex:1;
  object-fit:contain;
  width:100%;
  background:#000;
}

/* TOAST */
.toast {
  position:fixed;
  bottom:max(90px, calc(env(safe-area-inset-bottom) + 70px));
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(30,30,30,0.95);
  backdrop-filter:blur(16px);
  color:#fff;
  padding:12px 24px;
  border-radius:24px;
  font-size:14px;
  font-weight:500;
  opacity:0;
  transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
  white-space:nowrap;
  z-index:999;
}

.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* Hidden inputs */
#scan-input, #gallery-input { display:none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Freight<span>Scan</span></div>
  <div class="doc-badge" id="doc-badge">0</div>
</div>

<!-- SCAN ZONE -->
<div class="scan-zone" id="scan-zone">
  <div class="scan-icon-wrap">📄</div>
  <h1>Skenēt dokumentu</h1>
  <p>iPhone automātiski atrod dokumenta malas un iztaisno perspektīvu</p>
  <button class="scan-btn" onclick="document.getElementById('scan-input').click()">
    📷 Skenēt ar kameru
  </button>
  <button class="scan-btn-secondary" onclick="document.getElementById('gallery-input').click()">
    🖼 Izvēlēties no galerijas
  </button>
</div>

<!-- DOCS LIST -->
<div class="docs-section" id="docs-section">
  <div class="section-title">Skenētie dokumenti</div>
  <div id="docs-list"></div>
</div>

<!-- EXPORT BAR -->
<div class="export-wrap" id="export-wrap">
  <button class="export-btn" id="export-btn" onclick="exportPDF()">
    ⬇ Eksportēt PDF
  </button>
</div>

<!-- PREVIEW MODAL -->
<div class="modal" id="preview-modal">
  <div class="modal-header">
    <div class="modal-title">Priekšskatījums</div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <img class="modal-img" id="modal-img" src="" alt="preview">
</div>

<!-- iOS: capture="environment" atver kameru ar dokumentu skenēšanu -->
<input type="file" id="scan-input" accept="image/*" capture="environment" onchange="handleScan(event)">
<input type="file" id="gallery-input" accept="image/*" onchange="handleScan(event)">

<div class="toast" id="toast"></div>

<script>
let documents = [];

function handleScan(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    documents.push({
      id: Date.now(),
      image: ev.target.result,
      name: `Dokuments ${documents.length + 1}`,
      time: new Date().toLocaleTimeString('lv-LV', {hour:'2-digit', minute:'2-digit'}),
      size: (file.size / 1024).toFixed(0) + ' KB'
    });
    renderDocs();
    updateBadge();
    toast('✅ Dokuments pievienots!');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function renderDocs() {
  const list = document.getElementById('docs-list');
  const section = document.getElementById('docs-section');
  const exportWrap = document.getElementById('export-wrap');
  const scanZone = document.getElementById('scan-zone');

  if (documents.length === 0) {
    section.style.display = 'none';
    exportWrap.style.display = 'none';
    scanZone.style.flex = '1';
    return;
  }

  section.style.display = 'flex';
  exportWrap.style.display = 'block';
  scanZone.style.flex = '0';
  scanZone.style.paddingTop = '20px';
  scanZone.style.paddingBottom = '4px';
  scanZone.querySelector('h1').style.display = 'none';
  scanZone.querySelector('p').style.display = 'none';
  scanZone.querySelector('.scan-icon-wrap').style.display = 'none';

  list.innerHTML = documents.map((doc, i) => `
    <div class="doc-card">
      <img class="doc-preview" src="${doc.image}" onclick="openModal('${doc.id}')">
      <div class="doc-info">
        <div class="doc-name">${doc.name}</div>
        <div class="doc-meta">${doc.time} · ${doc.size}</div>
      </div>
      <div class="doc-actions">
        <button class="icon-btn" onclick="openModal(${doc.id})">👁</button>
        <button class="icon-btn" onclick="deleteDoc(${doc.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

function updateBadge() {
  const b = document.getElementById('doc-badge');
  b.textContent = documents.length;
  b.style.display = documents.length > 0 ? 'block' : 'none';
}

function deleteDoc(id) {
  documents = documents.filter(d => d.id !== id);
  renderDocs();
  updateBadge();
  toast('🗑 Dzēsts');
}

function openModal(id) {
  const doc = documents.find(d => d.id == id);
  if (!doc) return;
  document.getElementById('modal-img').src = doc.image;
  document.getElementById('preview-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('preview-modal').classList.remove('show');
}

async function exportPDF() {
  if (!documents.length) return;
  const btn = document.getElementById('export-btn');
  btn.textContent = 'Veido PDF...';
  btn.disabled = true;

  try {
    const { PDFDocument, rgb } = PDFLib;
    const pdf = await PDFDocument.create();

    for (const doc of documents) {
      const page = pdf.addPage([595, 842]);
      const b64 = doc.image.split(',')[1];
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      let img;
      try { img = await pdf.embedJpg(bytes); } catch { img = await pdf.embedPng(bytes); }
      const { width, height } = img.scale(1);
      const scale = Math.min(555/width, 800/height);
      const x = (595 - width*scale) / 2;
      page.drawImage(img, { x, y: 30, width: width*scale, height: height*scale });
      page.drawText(`FreightScan · ${doc.name} · ${doc.time}`, {
        x: 20, y: 12, size: 8, color: rgb(0.6, 0.6, 0.6)
      });
    }

    const bytes = await pdf.save();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `FreightScan_${new Date().toISOString().slice(0,10)}.pdf`;
    a.click();
    toast('📄 PDF lejuplādēts!');
  } catch(e) {
    toast('Kļūda: ' + e.message);
  }

  btn.textContent = '⬇ Eksportēt PDF';
  btn.disabled = false;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
